<div class="initiative-bubble-wrapper">
  <!-- Floating bubble button -->
  <button class="bubble-btn" (click)="toggleOpen()" [class.has-pending]="submittedInitiative !== null"
    title="Enter your initiative">
    <span class="bubble-icon">⚔</span>
    <span class="bubble-badge" *ngIf="submittedInitiative !== null">{{ submittedInitiative }}</span>
  </button>

  <!-- Panel -->
  <div class="bubble-panel" *ngIf="isOpen">
    <div class="panel-header">
      <span>My Initiative</span>
      <button class="close-btn" (click)="close()">✕</button>
    </div>

    <!-- Character selection (if none selected yet) -->
    <ng-container *ngIf="!selectedCharacterType">
      <p class="panel-hint">Select your character:</p>
      <div class="char-list">
        <button class="char-btn" *ngFor="let char of characters" (click)="selectCharacter(char.type)">
          <img class="char-thumb" [src]="'./images/character/thumbnail/fh-' + char.type + '.png'"
            (error)="$any($event.target).src='./images/bb/daemon-skull.svg'" />
          <span>{{ char.name || char.type }}</span>
        </button>
      </div>
    </ng-container>

    <!-- Initiative area (character selected) -->
    <ng-container *ngIf="selectedCharacterType">
      <div class="selected-char">
        <img class="char-thumb-sm"
          [src]="'./images/character/thumbnail/fh-' + selectedCharacterType + '.png'"
          (error)="$any($event.target).src='./images/bb/daemon-skull.svg'" />
        <span class="char-name">{{ selectedCharacterName }}</span>
        <button class="change-btn" (click)="clearCharacterSelection()" title="Change character">↺</button>
      </div>

      <!-- Input mode: own character with no revealed initiative, or another with no initiative yet -->
      <ng-container *ngIf="initiativeDisplayMode === 'input'">
        <p class="panel-hint">Enter initiative (secret):</p>
        <div class="initiative-row">
          <input
            type="tel"
            class="initiative-input"
            [value]="initiativeInput"
            maxlength="2"
            placeholder="00"
            (input)="initiativeInput = $any($event.target).value"
            (keyup.enter)="submitInitiative()"
          />
          <button class="submit-btn" (click)="submitInitiative()">Submit</button>
        </div>
      </ng-container>

      <!-- Hidden mode: another player's character has submitted but not yet revealed -->
      <ng-container *ngIf="initiativeDisplayMode === 'hidden'">
        <p class="panel-hint">Initiative submitted (hidden):</p>
        <div class="initiative-row">
          <span class="initiative-display initiative-hidden">??</span>
        </div>
      </ng-container>

      <!-- Revealed mode: initiative is public -->
      <ng-container *ngIf="initiativeDisplayMode === 'revealed'">
        <p class="panel-hint">Initiative:</p>
        <div class="initiative-row">
          <span class="initiative-display">{{ revealedInitiative }}</span>
        </div>
      </ng-container>

      <p class="submitted-label" *ngIf="submittedInitiative !== null">
        Ready: <strong>{{ submittedInitiative }}</strong> <span class="hint">(changes until Next Round)</span>
      </p>
    </ng-container>
  </div>
</div>
