
<app-chevron-toggle [expanded]="appContext.shouldShowSetup" (toggle)="appContext.shouldShowSetup = !appContext.shouldShowSetup" [ngClass]="appContext.shouldShowSetup ? 'expanded' : ''"></app-chevron-toggle>
<div class="setup-container row content" [style.display]="appContext.shouldShowSetup ? null : 'none'">
  <div class="section compact">
    <label class="field-chip" for="scenario-level">Level</label>
    <input id="scenario-level" type="tel" placeholder="#" [(ngModel)]="scenarioLevel" (ngModelChange)="onScenarioLevelChange($event)" />
    <button class="action-button" (click)="startNewGame()">New Run</button>
  </div>

  <div class="section compact">
    <label class="field-chip" for="scenario-id">Mission</label>
    <input id="scenario-id" type="tel" placeholder="#" [(ngModel)]="scenarioId" />
    <button class="action-button" (click)="loadScenario()">Load</button>
  </div>

  <div class="section compact">
    <label class="field-chip" for="section-id">Section</label>
    <input id="section-id" type="tel" placeholder="#" [(ngModel)]="sectionId" />
    <button class="action-button" (click)="loadSection()">Load</button>
  </div>

  <div class="section standalone-action">
    <button class="action-button" (click)="this.appContext.addMonsterToggled = !this.appContext.addMonsterToggled">
      Add Monster
    </button>
  </div>

  <div class="section standalone-action">
    <button class="action-button" (click)="startSession()">Host Session</button>
  </div>

  <div class="section compact">
    <label class="field-chip" for="session-id">Session</label>
    <input id="session-id" type="tel" placeholder="1" [(ngModel)]="sessionId" />
    <button class="action-button" (click)="joinSession()">Join</button>
  </div>

  <div class="section compact highlight">
    <label class="field-chip" for="bonus-xp">Bonus XP</label>
    <input id="bonus-xp" type="tel" placeholder="#" [(ngModel)]="bonusXp" />
    <button class="action-button cancel" (click)="endGame()">End Game</button>
  </div>
</div>

<app-confirmation-dialog
  [isVisible]="showEndGameConfirmation"
  [title]="''"
  [message]="endGameConfirmationMessage"
  [confirmText]="'Commit'"
  [cancelText]="'Cancel'"
  (confirmed)="onEndGameConfirmed()"
  (cancelled)="onEndGameCancelled()">
</app-confirmation-dialog>
