<div class="log-container">
  <div class="log-header">
    <h3 (click)="shouldShowLog = !shouldShowLog" role="button" tabindex="0">Audit History</h3>
    <app-chevron-toggle [expanded]="shouldShowLog" (toggle)="shouldShowLog = !shouldShowLog"></app-chevron-toggle>
    <button
      class="undo-btn"
      [disabled]="!(canUndo$ | async)"
      (click)="undoLastBatch()"
      title="Undo last change">
      <span class="icon undo"></span>
      Shit
    </button>
  </div>

  <div class="log-content" [style.display]="shouldShowLog ? null : 'none'">
    <div class="log-filter" *ngIf="(characters$ | async) as chars">
      <ng-container *ngIf="chars.length">
        <select multiple (change)="onFilterChange($event)">
          <option *ngFor="let c of chars" [value]="c.value">{{ c.text }}</option>
        </select>
      </ng-container>
    </div>

    <table class="log-table">
      <thead>
        <tr>
          <th>When</th>
          <th>Who</th>
          <th>What</th>
          <th>Value</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let log of (filteredLogs$ | async)" [class.batch-top]="log.batchId === (filteredLogs$ | async)?.[0]?.batchId">
          <td>{{ log.time }}</td>
          <td>{{ log.creature }}</td>
          <td>{{ log.stat }}</td>
          <td>{{ log.value }}</td>
        </tr>
      </tbody>
    </table>

    <div class="pager" *ngIf="(totalPages$ | async) as total">
      <button (click)="prevPage(total)" [disabled]="currentPage$.value === 1">Prev</button>
      <span>Page {{ currentPage$.value }} / {{ total }}</span>
      <button (click)="nextPage(total)" [disabled]="currentPage$.value === total">Next</button>
    </div>
  </div>
</div>
