<div class="creature-details" [ngClass]="[
       creature.type,
       creature.boss ? 'boss'
         : creature.isElite ? 'elite'
         : 'non-elite',
       creature.aggressive ? '' : 'character'
     ]">

  <div class="base-stat row">
    <div class="creature-initiative">
      <!-- Monsters: always show initiative input -->
      <input *ngIf="creature.aggressive" type="tel" [value]="creature.initiative"
        (blur)="onMonsterInitiativeBlur(creature.id!, $event)" maxlength="2"
        class="stat-input" />
      <!-- Heroes: show input when all initiatives revealed, icon otherwise -->
      <ng-container *ngIf="!creature.aggressive">
        <input *ngIf="initiativesRevealed" type="tel" [value]="creature.initiative"
          (blur)="appContext.updateCreatureBaseStat(creature.id!, 'initiative', +$event.target.value, false)" maxlength="2"
          class="stat-input" />
        <div *ngIf="!initiativesRevealed"
          class="initiative-status-icon"
          [class.ready]="creature?.hiddenInitiative > 0 || creature?.initiative > 0"          
          [class.not-ready]="creature?.hiddenInitiative == 0 && creature?.initiative == 0"
          [title]="(creature?.hiddenInitiative > 0 || creature?.initiative > 0) ? 'Initiative submitted' : 'Waiting for initiative'">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
            <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zm0 12.5a5 5 0 1 1 0-10 5 5 0 0 1 0 10zm0-8a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/>
          </svg>
        </div>
      </ng-container>
    </div>
    <div class="name" *ngIf="creature.aggressive">
      {{ creature.type }}
    </div>
    <div class="name" *ngIf="!creature.aggressive">
      <div class="icon level">
        <span class="level-number">{{ creature.level }}</span>
      </div>
    </div>
  </div>
  <div class="info row">
    <div class="portrait-xp" *ngIf="!creature.aggressive">
      <div class="xp-container">
        <div class="xp-numbers">
          <span *ngFor="let d of (creature.totalXp + '').split('')">
            {{ d }}
          </span>
        </div>
        <div class="xp-bar">
          <span class="xp-fill" [style.height.%]="getXpPercentToNext(creature.totalXp)">
          </span>
          <span class="xp-remaining">
            {{ getXpRemainingToNext(creature.totalXp) }}
          </span>
        </div>
      </div>
    </div>
    <img class="profile" [src]="getCreaturePic(creature)" (error)="onImgError($event)" (click)="openConditionModal()" />
    <div class="group-stats" *ngIf="creature.aggressive">
      <div class="stats">
        <div class="base-stat" [class.bordered]="hasExtraStats(creature)">
          <div class="icon attack"></div>
          <span class="stat-value">{{ creature.attack }}</span>
          <div *ngIf="creature.attackTarget > 1" class="icon target"></div>
          <span *ngIf="creature.attackTarget > 1" class="stat-value">{{ creature.attackTarget }}</span>
        </div>
        <div class="base-stat" *ngIf="creature.armor + creature.roundArmor > 0">
          <div class="icon shield">{{ creature.armor + creature.roundArmor }}</div>
        </div>
        <div class="base-stat" *ngIf="creature.retaliate + creature.roundRetaliate > 0">
          <div class="icon retaliate">{{ creature.retaliate + creature.roundRetaliate }}</div>
          <div class="icon range" *ngIf="creature.retaliateRange > 0">{{creature.retaliateRange}}</div>
        </div>
        <div class="traits" *ngIf="creature.aggressive && creature.actions?.length">
          <div class="icon" *ngFor="let action of creature.actions" [class]="action.value"></div>
        </div>
      </div>
      <div class="stats">
        <div class="base-stat" [class.bordered]="creature.flying">
          <div class="icon move"></div>
          <span class="stat-value">{{ creature.movement }}</span>
        </div>
        <div class="base-stat" *ngIf="creature.flying">
          <div class="icon flying"></div>
        </div>
      </div>
    </div>
    <div class="group-stats" *ngIf="!creature.aggressive">
      <div class="stats">
        <div class="base-stat">
          <div class="icon heart">
            <input type="tel" [value]="creature.hp" (blur)="updateCreatureHp(creature.id!, +$event.target.value)"
              maxlength="2" class="stat-input" />
          </div>
        </div>
      </div>
      <div class="stats">
        <div class="base-stat">
          <div class="icon xp">
            <input type="tel" [value]="creature.sessionExperience ?? 0" (click)="onSessionXpClick(creature)"
              (blur)="onSessionXpBlur(creature, $event)" maxlength="2" class="stat-input" />
          </div>
        </div>
      </div>
    </div>
  </div>
