<div class="modal" (click)="closeModal()">
  <div class="content" (click)="$event.stopPropagation()">
    <div class="title">Add Item</div>

    <div class="form-row">
      <label for="type">Type</label>
      <input id="type" type="text" [(ngModel)]="type" (input)="onTypeInput()" (focus)="openPicker()"
        autocomplete="off" inputmode="search" autocapitalize="off" autocorrect="off"
        placeholder="Select…" onfocus="if(this.value) this.value=''" />
    </div>

    <div class="item-picker-sheet" *ngIf="pickerOpen" (click)="$event.stopPropagation()">
      <div class="picker-close" (click)="closePicker()">✕</div>
      <div class="item-type-list">
        <div class="item-type-item" *ngFor="let item of filteredItemTypes"
          (mousedown)="$event.preventDefault()" (click)="selectItem(item)">
          {{ item }}
        </div>
      </div>
    </div>

    <div class="form-row">
      <label for="id">ID</label>
      <input type="tel" id="id" placeholder="#" [(ngModel)]="id" />
    </div>

    <div class="buttons">
      <button type="button" class="cancel" (click)="closeModal()">Close</button>
      <button type="button" class="confirm" (click)="addItem()">Confirm</button>
    </div>
  </div>
</div>
